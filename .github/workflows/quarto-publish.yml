name: Deploy Quarto Book to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install minimal R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::ragg

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render (using frozen results)
        run: quarto render --to html
        env:
          QUARTO_PROFILE: ci

      - name: NFC-normalize filenames
        run: |
          python3 -c "
          import os, shutil, unicodedata, tempfile

          book = '_book'
          tmp = tempfile.mkdtemp()
          count = 0

          for root, dirs, files in os.walk(book):
              rel = os.path.relpath(root, book)
              nfc_rel = unicodedata.normalize('NFC', rel)
              dst_dir = os.path.join(tmp, nfc_rel)
              os.makedirs(dst_dir, exist_ok=True)
              for f in files:
                  nfc_name = unicodedata.normalize('NFC', f)
                  shutil.copy2(os.path.join(root, f), os.path.join(dst_dir, nfc_name))
                  if f != nfc_name:
                      count += 1

          shutil.rmtree(book)
          shutil.move(tmp, book)
          print(f'Normalized {count} filenames to NFC')
          "

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
