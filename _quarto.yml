project:
  type: book
  output-dir: _book
  post-render:
    - python3 _scripts/normalize_nfc.py

book:
  title: "Rによる統計解析実戦ガイド"
  author: "小室竜也"
  date: today
  chapters:
    - index.qmd
    - Rの基本的な使い方.qmd
    
    - part: "第I部：統計モデルの基礎"
      chapters:
        - 統計モデルについての概略.qmd
        - 1_T検定と効果量.qmd
        - 2_ANOVAとカテゴリカル変数のコーディング.qmd
        - 3_MANOVA_判別分析.qmd
    
    - part: "第II部：回帰分析"
      chapters:
        - 4_重回帰分析と交互作用.qmd
        - 5_一般化線形モデル_一般化加法モデル.qmd
        - 6_混合効果モデル_2値ロジスティック回帰.qmd
    
    - part: "第III部：ベイズ統計と機械学習"
      chapters:
        - 7_ベイズ推定.qmd
        - 8_予測分析_ROC曲線とツリーモデル.qmd
    
    - part: "第IV部：多変量解析"
      chapters:
        - 9_潜在変数モデリングと次元縮約.qmd
        - 10_一般化可能性理論.qmd
        - 11_項目応答理論とラッシュモデル.qmd
        - 12_拡張ラッシュモデル.qmd

    - part: "第V部：時系列データ分析"
      chapters:
        - 13_時系列データ分析_基礎.qmd
        - 13b_時系列データ分析_発展.qmd
        - 13c_音声時系列分析_Praat.qmd

    - part: "第VI部：地理空間データ"
      chapters:
        - 14_地理空間データ分析_入門.qmd
        - 15_地理空間データ分析_応用.qmd
    
    - part: "第VII部：ネットワーク分析"
      chapters:
        - 16_ネットワーク分析.qmd

    - part: "第VIII部：メタ分析"
      chapters:
        - 17_メタ分析.qmd

    - part: "第IX部：因果推論とクラスタリング"
      chapters:
        - 18_統計的因果推論.qmd
        - 19_クラスタリング.qmd

    - part: "第X部：欠測データ解析とロバスト統計"
      chapters:
        - 20_欠測データ解析とロバスト統計.qmd

    - 参考文献_推薦書籍.qmd

csl: apa-7th-edition.csl

format:
  html:
    theme: journal
    css: custom.css
    include-after-body:
      - plot-zoom.html
      - layout-controls.html
      - sidebar-page-toc.html
    grid:
      sidebar-width: 320px
      body-width: 1240px
      margin-width: 0px
      gutter-width: 1.5rem
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "目次"
    number-sections: true
    number-depth: 3
    code-fold: show
    code-summary: "コード"
    code-tools: true
    code-copy: hover
    code-overflow: scroll
    fontsize: 1.1em
    linestretch: 1.8
    mainfont: "Noto Serif JP"
    fig-align: center
    fig-responsive: true
    tbl-cap-location: top
    html-table-processing: none
    crossref:
      fig-title: "図"
      tbl-title: "表"
      eq-prefix: "式"
    lang: ja
    
  pdf:
    pdf-engine: lualatex
    prefer-html: true
    documentclass: ltjsbook
    classoption:
      - openany
      - 11pt
      - a4paper
    geometry:
      - top=25mm
      - bottom=25mm
      - left=20mm
      - right=20mm
    papersize: a4
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: blue
    citecolor: blue
    urlcolor: blue
    keep-tex: false
    
  epub:
    toc: true
    toc-depth: 2
    epub-chapter-level: 2

execute:
  freeze: auto
  cache: true
  echo: true
  warning: false
  message: false
  fig-width: 7
  fig-height: 5
  fig-dpi: 300

knitr:
  opts_chunk:
    dev: ragg_png

editor: visual

language:
  crossref-fig-title: "図"
  crossref-tbl-title: "表"
  crossref-eq-prefix: "式"
